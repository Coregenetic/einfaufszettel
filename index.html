<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mein Einkaufszettel</title>
    
    <!-- App-like Verhalten für iOS und Android (Vollbild, keine URL-Leiste) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Einkauf">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d9488"> <!-- Passt zur Teal-Farbe (Türkis) der App -->

    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons für die Symbole (Mikrofon, Mülleimer etc.) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6; /* Leichtes Grau für den Hintergrund */
            -webkit-tap-highlight-color: transparent; /* Entfernt das blaue Flackern beim Tippen auf Handys */
        }
        
        /* Pulsierende Animation für den Aufnahme-Button */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        .listening {
            animation: pulse-ring 2s infinite;
            background-color: #ef4444 !important; /* Rot wenn es aufnimmt */
            color: white !important;
        }

        /* Sanftes Einblenden der Listen-Elemente */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Checkbox Styling */
        .custom-checkbox:checked + div {
            background-color: #10b981;
            border-color: #10b981;
        }
        .custom-checkbox:checked + div svg {
            display: block;
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col">

    <div class="max-w-md w-full mx-auto bg-white h-full shadow-xl flex flex-col relative overflow-hidden">
        
        <!-- Header -->
        <header class="bg-teal-600 text-white p-5 rounded-b-3xl shadow-md z-10">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="ph ph-shopping-cart text-3xl"></i>
                Einkaufszettel
            </h1>
            <p class="text-teal-100 text-sm mt-1" id="item-count">0 Artikel auf der Liste</p>
        </header>

        <!-- Main Content Area (Scrollable List) -->
        <main class="flex-1 overflow-y-auto p-4 pb-32">
            <ul id="shopping-list" class="space-y-3">
                <!-- Die Listen-Elemente werden hier per JavaScript eingefügt -->
            </ul>
            
            <!-- Leerer Zustand (wenn die Liste leer ist) -->
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-gray-400 mt-10">
                <i class="ph ph-basket text-6xl mb-3 text-gray-300"></i>
                <p class="text-center">Dein Zettel ist leer.<br>Tippe auf das Mikrofon!</p>
            </div>
        </main>

        <!-- Footer / Input Area -->
        <footer class="absolute bottom-0 w-full bg-white border-t border-gray-100 p-4 pb-6 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-20">
            
            <!-- Feedback Text für die Spracherkennung -->
            <div id="status-text" class="text-center text-sm text-gray-500 mb-3 h-5 transition-opacity"></div>

            <div class="flex items-center gap-2">
                <!-- Text Eingabe (Fallback) -->
                <div class="relative flex-1">
                    <input type="text" id="manual-input" placeholder="Artikel tippen..." 
                           class="w-full bg-gray-100 border-none rounded-full py-3 px-5 pr-12 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all shadow-inner">
                    <button id="add-btn" class="absolute right-1 top-1 bottom-1 bg-teal-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-teal-700 transition-colors">
                        <i class="ph ph-plus text-xl"></i>
                    </button>
                </div>

                <!-- Mikrofon Button (Der Star der App) -->
                <button id="mic-btn" class="w-14 h-14 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center shadow-md transition-all hover:bg-teal-200 focus:outline-none flex-shrink-0">
                    <i class="ph ph-microphone text-2xl" id="mic-icon"></i>
                </button>
            </div>
        </footer>
    </div>

    <script>
        // State Management
        let items = JSON.parse(localStorage.getItem('shoppingList')) || [];
        
        // DOM Elemente
        const listElement = document.getElementById('shopping-list');
        const emptyState = document.getElementById('empty-state');
        const itemCountText = document.getElementById('item-count');
        const manualInput = document.getElementById('manual-input');
        const addBtn = document.getElementById('add-btn');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const statusText = document.getElementById('status-text');

        // Speichern in LocalStorage
        function saveItems() {
            localStorage.setItem('shoppingList', JSON.stringify(items));
            updateUI();
        }

        // Artikel hinzufügen
        function addItem(text) {
            const cleanText = text.trim();
            if (!cleanText) return;
            
            // Punkt am Ende entfernen, den die Spracherkennung oft anfügt
            const formattedText = cleanText.replace(/\.$/, '');

            items.push({
                id: Date.now().toString(),
                text: formattedText.charAt(0).toUpperCase() + formattedText.slice(1), // Erster Buchstabe groß
                checked: false
            });
            
            saveItems();
            manualInput.value = ''; // Eingabefeld leeren
        }

        // Artikel umschalten (gekauft / nicht gekauft)
        function toggleItem(id) {
            items = items.map(item => {
                if (item.id === id) {
                    return { ...item, checked: !item.checked };
                }
                return item;
            });
            saveItems();
        }

        // Artikel löschen
        function deleteItem(id) {
            items = items.filter(item => item.id !== id);
            saveItems();
        }

        // UI Aktualisieren
        function updateUI() {
            // Liste leeren
            listElement.innerHTML = '';
            
            if (items.length === 0) {
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
                
                // Gekaufte Artikel nach unten sortieren
                const sortedItems = [...items].sort((a, b) => a.checked - b.checked);

                sortedItems.forEach(item => {
                    const li = document.createElement('li');
                    li.className = `fade-in flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border ${item.checked ? 'border-gray-200 opacity-60 bg-gray-50' : 'border-gray-100'} transition-all duration-200`;
                    
                    li.innerHTML = `
                        <label class="flex items-center gap-3 cursor-pointer flex-1">
                            <div class="relative flex items-center justify-center">
                                <input type="checkbox" class="custom-checkbox opacity-0 absolute h-0 w-0" ${item.checked ? 'checked' : ''} onchange="toggleItem('${item.id}')">
                                <div class="w-6 h-6 border-2 border-gray-300 rounded-full flex items-center justify-center transition-colors">
                                    <svg class="w-4 h-4 text-white hidden pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                            </div>
                            <span class="text-lg ${item.checked ? 'line-through text-gray-400' : 'text-gray-700'} transition-colors">${item.text}</span>
                        </label>
                        <button onclick="deleteItem('${item.id}')" class="text-gray-400 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition-colors ml-2 focus:outline-none">
                            <i class="ph ph-trash text-xl"></i>
                        </button>
                    `;
                    listElement.appendChild(li);
                });
            }

            // Zähler aktualisieren
            const openItemsCount = items.filter(i => !i.checked).length;
            itemCountText.textContent = `${openItemsCount} Artikel zu besorgen`;
        }

        // --- SPRACHERKENNUNG (Web Speech API) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'de-DE'; // Auf Deutsch stellen
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                isListening = true;
                micBtn.classList.add('listening');
                micIcon.classList.remove('ph-microphone');
                micIcon.classList.add('ph-microphone-stage');
                statusText.textContent = "Ich höre zu... (z.B. 'Brot')";
                statusText.classList.add('text-teal-600', 'font-medium');
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                addItem(transcript);
                statusText.textContent = `"${transcript}" hinzugefügt!`;
                
                // Nach 2 Sekunden Text wieder ausblenden
                setTimeout(() => {
                    if(!isListening) statusText.textContent = "";
                }, 2000);
            };

            recognition.onerror = function(event) {
                console.error("Spracherkennung Fehler:", event.error);
                statusText.textContent = "Fehler beim Hören. Bitte erneut versuchen.";
                statusText.classList.remove('text-teal-600', 'font-medium');
                statusText.classList.add('text-red-500');
                stopListening();
            };

            recognition.onend = function() {
                stopListening();
            };
        } else {
            // Browser unterstützt keine Spracherkennung
            micBtn.style.display = 'none';
            statusText.textContent = "Spracherkennung in diesem Browser nicht unterstützt.";
        }

        function stopListening() {
            isListening = false;
            micBtn.classList.remove('listening');
            micIcon.classList.add('ph-microphone');
            micIcon.classList.remove('ph-microphone-stage');
            if(statusText.textContent.includes("Ich höre zu")) {
                statusText.textContent = "";
            }
        }

        // Event Listener für Buttons
        micBtn.addEventListener('click', () => {
            if (!recognition) {
                statusText.textContent = "Spracherkennung wird von diesem Browser leider nicht unterstützt (bitte Safari/Chrome nutzen).";
                statusText.classList.remove('text-teal-600', 'font-medium');
                statusText.classList.add('text-red-500');
                return;
            }
            
            if (isListening) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch(e) {
                    console.log("Erkennung läuft bereits");
                }
            }
        });

        addBtn.addEventListener('click', () => {
            addItem(manualInput.value);
        });

        manualInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addItem(manualInput.value);
            }
        });

        // Initiale UI laden
        updateUI();

    </script>
</body>
</html>
