<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mein Einkaufszettel</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Einkauf">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d9488">

    <!-- Dynamischer Link für das App-Manifest (wird im JS gesetzt) -->
    <link id="manifest-link" rel="manifest" href="">

    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .listening { animation: pulse-ring 2s infinite; background-color: #ef4444 !important; color: white !important; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .custom-checkbox:checked + div { background-color: #10b981; border-color: #10b981; }
        .custom-checkbox:checked + div svg { display: block; }
        
        /* Views umschalten */
        .view { display: none; }
        .view.active { display: flex; flex-direction: column; }
        
        /* Tab Bar Styles */
        .tab-btn { transition: color 0.2s ease; }
        
        /* Safe Area für moderne Smartphones (iPhone Notch etc.) */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen overflow-hidden">

    <div class="max-w-md w-full mx-auto bg-gray-50 h-full shadow-xl relative overflow-hidden flex flex-col">

        <!-- MAIN CONTENT WRAPPER -->
        <div class="flex-1 relative overflow-hidden">
            
            <!-- VIEW 1: EINKAUFSZETTEL -->
            <div id="view-shopping" class="view active h-full w-full absolute inset-0">
                <header class="bg-teal-600 text-white p-5 rounded-b-3xl shadow-md z-10">
                    <h1 class="text-2xl font-bold flex items-center gap-2" id="current-list-title">Lade Liste...</h1>
                    <p class="text-teal-100 text-sm mt-1" id="item-count">0 Artikel auf der Liste</p>
                </header>

                <main class="flex-1 overflow-y-auto p-4 pb-32">
                    <ul id="shopping-list" class="space-y-3"></ul>
                    <div id="empty-state" class="flex flex-col items-center justify-center h-full text-gray-400 mt-10">
                        <i class="ph ph-basket text-6xl mb-3 text-gray-300"></i>
                        <p class="text-center">Dein Zettel ist leer.<br>Tippe auf das Mikrofon!</p>
                    </div>
                </main>

                <!-- Input Area (Eingebettet in der View) -->
                <div class="absolute bottom-0 w-full bg-white border-t border-gray-100 p-4 pb-6 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-20">
                    <div id="status-text" class="text-center text-sm text-gray-500 mb-3 h-5 transition-opacity"></div>
                    <div class="flex items-center gap-2">
                        <div class="relative flex-1">
                            <input type="text" id="manual-input" placeholder="Artikel tippen..." 
                                   class="w-full bg-gray-100 border-none rounded-full py-3 px-5 pr-12 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all shadow-inner">
                            <button id="add-btn" class="absolute right-1 top-1 bottom-1 bg-teal-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-teal-700 transition-colors">
                                <i class="ph ph-plus text-xl"></i>
                            </button>
                        </div>
                        <button id="mic-btn" class="w-14 h-14 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center shadow-md transition-all hover:bg-teal-200 focus:outline-none flex-shrink-0">
                            <i class="ph ph-microphone text-2xl" id="mic-icon"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- VIEW 2: LISTEN VERWALTUNG -->
            <div id="view-lists" class="view h-full w-full absolute inset-0 bg-gray-50 z-30">
                <header class="bg-white p-5 border-b shadow-sm">
                    <h1 class="text-xl font-bold text-gray-800">Meine Listen</h1>
                </header>
                <main class="flex-1 overflow-y-auto p-5 pb-24">
                    <ul id="lists-container" class="space-y-2 mb-6"></ul>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="text-sm font-bold text-gray-600 mb-3">Neue Liste anlegen</h3>
                        <div class="flex gap-2">
                            <input type="text" id="new-list-input" placeholder="z.B. Baumarkt..." 
                                   class="flex-1 bg-gray-50 border border-gray-200 rounded-xl py-2 px-4 focus:outline-none focus:border-teal-500 text-sm">
                            <button onclick="createNewList()" class="bg-teal-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-teal-700 transition">
                                <i class="ph ph-plus font-bold"></i>
                            </button>
                        </div>
                    </div>
                </main>
            </div>

            <!-- VIEW 3: EINSTELLUNGEN -->
            <div id="view-settings" class="view h-full w-full absolute inset-0 bg-gray-50 z-30">
                <header class="bg-white p-5 border-b shadow-sm">
                    <h1 class="text-xl font-bold text-gray-800">Einstellungen</h1>
                </header>
                <main class="flex-1 overflow-y-auto p-5 pb-24">
                    <div id="install-container" class="hidden mb-6 bg-gradient-to-r from-teal-500 to-emerald-500 text-white rounded-2xl p-4 shadow-md flex items-center justify-between">
                        <div>
                            <h3 class="font-bold">App installieren</h3>
                            <p class="text-xs text-teal-100">Zum Startbildschirm</p>
                        </div>
                        <button id="install-btn" class="bg-white text-teal-600 px-4 py-2 rounded-full text-sm font-bold shadow-sm hover:bg-teal-50">
                            Installieren
                        </button>
                    </div>

                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 ml-1">Optionen</h2>
                    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm">
                        <div class="p-4 border-b border-gray-50 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center">
                                    <i class="ph ph-translate text-lg"></i>
                                </div>
                                <span class="text-gray-700">Sprache</span>
                            </div>
                            <select id="lang-select" onchange="saveSettings()" class="bg-gray-100 border-none text-sm rounded-lg py-1 px-2 focus:ring-0 cursor-pointer">
                                <option value="de-DE">Deutsch</option>
                                <option value="en-US">English</option>
                            </select>
                        </div>
                        <div class="p-4 flex items-center justify-between cursor-pointer hover:bg-red-50 transition" onclick="clearAllData()">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-red-50 text-red-500 flex items-center justify-center">
                                    <i class="ph ph-warning-circle text-lg"></i>
                                </div>
                                <span class="text-red-600 font-medium">Daten löschen</span>
                            </div>
                        </div>
                    </div>
                </main>
            </div>

        </div>

        <!-- BOTTOM NAVIGATION TAB BAR -->
        <nav class="bg-white border-t border-gray-200 flex justify-around pb-safe pt-2 px-2 z-40 pb-4 shadow-[0_-4px_15px_rgba(0,0,0,0.03)]">
            <button onclick="switchTab('view-shopping', this)" class="tab-btn active flex flex-col items-center p-2 text-teal-600 w-20">
                <i class="ph ph-shopping-cart text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">Einkauf</span>
            </button>
            <button onclick="switchTab('view-lists', this)" class="tab-btn flex flex-col items-center p-2 text-gray-400 hover:text-teal-500 w-20">
                <i class="ph ph-list-numbers text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">Listen</span>
            </button>
            <button onclick="switchTab('view-settings', this)" class="tab-btn flex flex-col items-center p-2 text-gray-400 hover:text-teal-500 w-20">
                <i class="ph ph-gear text-2xl mb-1"></i>
                <span class="text-[10px] font-medium">Setup</span>
            </button>
        </nav>

    </div>

    <script>
        // ==========================================
        // 1. DATEN-STRUKTUR & MIGRATION
        // ==========================================
        
        // Grundgerüst der Daten
        let appData = {
            currentListId: 'list_1',
            settings: { lang: 'de-DE' },
            lists: [
                { id: 'list_1', name: 'Go Gurls Liste', items: [] }
            ]
        };

        // Lade Daten aus LocalStorage oder migriere alte Version v1
        function loadData() {
            const savedData = localStorage.getItem('einkaufszettel_v2');
            if (savedData) {
                appData = JSON.parse(savedData);
            } else {
                // Check ob alte Daten (v1) existieren
                const oldList = localStorage.getItem('shoppingList');
                if (oldList) {
                    appData.lists[0].items = JSON.parse(oldList);
                    // Alte Daten löschen um aufzuräumen
                    localStorage.removeItem('shoppingList'); 
                }
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('einkaufszettel_v2', JSON.stringify(appData));
        }

        // Hilfsfunktion: Aktuelle Liste bekommen
        function getCurrentList() {
            return appData.lists.find(l => l.id === appData.currentListId) || appData.lists[0];
        }

        // ==========================================
        // 2. UI UPDATE LOGIK (Einkaufszettel)
        // ==========================================
        const listElement = document.getElementById('shopping-list');
        const emptyState = document.getElementById('empty-state');
        const itemCountText = document.getElementById('item-count');
        const currentListTitle = document.getElementById('current-list-title');

        function updateShoppingUI() {
            const currentList = getCurrentList();
            
            // Titel aktualisieren
            currentListTitle.innerHTML = `<i class="ph ph-shopping-cart text-3xl"></i> ${currentList.name}`;
            
            // Liste leeren
            listElement.innerHTML = '';
            
            if (currentList.items.length === 0) {
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
                
                // Gekaufte Artikel nach unten sortieren
                const sortedItems = [...currentList.items].sort((a, b) => a.checked - b.checked);

                sortedItems.forEach(item => {
                    const li = document.createElement('li');
                    li.className = `fade-in flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border ${item.checked ? 'border-gray-200 opacity-60 bg-gray-50' : 'border-gray-100'} transition-all duration-200`;
                    
                    let quantityHtml = '';
                    if (item.quantity) {
                        const badgeClass = item.quantityConfirmed 
                            ? 'bg-teal-100 text-teal-700 border-teal-200' 
                            : 'bg-orange-100 text-orange-700 border-orange-200 shadow-md transform hover:scale-105';
                        const iconHtml = item.quantityConfirmed ? '<i class="ph ph-check text-xs mr-1 font-bold"></i>' : '';
                        
                        quantityHtml = `
                            <div onclick="toggleQuantity(event, '${item.id}')" 
                                 class="mr-3 px-3 py-1.5 rounded-xl border font-bold text-sm flex items-center cursor-pointer transition-all active:scale-95 ${badgeClass}">
                                ${iconHtml}${item.quantity}
                            </div>
                        `;
                    }

                    li.innerHTML = `
                        <div class="flex items-center flex-1 min-w-0 pr-2">
                            <label class="flex items-center justify-center cursor-pointer mr-3">
                                <div class="relative flex items-center justify-center">
                                    <input type="checkbox" class="custom-checkbox opacity-0 absolute h-0 w-0" ${item.checked ? 'checked' : ''} onchange="toggleItem('${item.id}')">
                                    <div class="w-6 h-6 border-2 border-gray-300 rounded-full flex items-center justify-center transition-colors">
                                        <svg class="w-4 h-4 text-white hidden pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </div>
                                </div>
                            </label>
                            ${quantityHtml}
                            <span class="text-lg truncate ${item.checked ? 'line-through text-gray-400' : 'text-gray-700'} transition-colors cursor-pointer" onclick="toggleItem('${item.id}')">${item.text}</span>
                        </div>
                        <button onclick="deleteItem('${item.id}')" class="text-gray-400 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition-colors focus:outline-none flex-shrink-0">
                            <i class="ph ph-trash text-xl"></i>
                        </button>
                    `;
                    listElement.appendChild(li);
                });
            }

            const openItemsCount = currentList.items.filter(i => !i.checked).length;
            itemCountText.textContent = `${openItemsCount} Artikel in '${currentList.name}'`;
        }

        // ==========================================
        // 3. LISTEN-VERWALTUNG & EINSTELLUNGEN
        // ==========================================
        const listsContainer = document.getElementById('lists-container');
        const newListInput = document.getElementById('new-list-input');
        const langSelect = document.getElementById('lang-select');

        function updateMenuUI() {
            listsContainer.innerHTML = '';
            
            appData.lists.forEach(list => {
                const isActive = list.id === appData.currentListId;
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-3 rounded-xl cursor-pointer border ${isActive ? 'bg-teal-50 border-teal-200' : 'bg-white border-gray-100 hover:bg-gray-50'}`;
                
                li.innerHTML = `
                    <div class="flex-1 font-medium ${isActive ? 'text-teal-700' : 'text-gray-700'}" onclick="selectList('${list.id}')">
                        <i class="ph ${isActive ? 'ph-check-circle text-teal-500' : 'ph-list'} mr-2"></i>
                        ${list.name} (${list.items.length})
                    </div>
                    ${appData.lists.length > 1 ? `
                    <button onclick="deleteList('${list.id}')" class="text-gray-400 hover:text-red-500 p-1 rounded transition">
                        <i class="ph ph-trash"></i>
                    </button>
                    ` : ''}
                `;
                listsContainer.appendChild(li);
            });

            langSelect.value = appData.settings.lang;
        }

        function selectList(id) {
            appData.currentListId = id;
            saveData();
            updateMenuUI();
            updateShoppingUI();
            
            // Wechsel zurück zum Einkaufs-Tab
            const shoppingTabBtn = document.querySelector('.tab-btn:nth-child(1)');
            switchTab('view-shopping', shoppingTabBtn);
        }

        function createNewList() {
            const name = newListInput.value.trim();
            if (!name) return;
            
            const newList = {
                id: 'list_' + Date.now(),
                name: name,
                items: []
            };
            
            appData.lists.push(newList);
            appData.currentListId = newList.id; // Direkt auswählen
            newListInput.value = '';
            
            saveData();
            updateMenuUI();
            updateShoppingUI();
            
            // Wechsel zurück zum Einkaufs-Tab
            const shoppingTabBtn = document.querySelector('.tab-btn:nth-child(1)');
            switchTab('view-shopping', shoppingTabBtn);
        }

        function deleteList(id) {
            if (confirm('Liste wirklich löschen?')) {
                appData.lists = appData.lists.filter(l => l.id !== id);
                if (appData.currentListId === id) {
                    appData.currentListId = appData.lists[0].id;
                }
                saveData();
                updateMenuUI();
                updateShoppingUI();
            }
        }

        function saveSettings() {
            appData.settings.lang = langSelect.value;
            if(recognition) recognition.lang = appData.settings.lang;
            saveData();
        }

        function clearAllData() {
            if (confirm('ACHTUNG: Willst du wirklich ALLE Listen und Daten unwiderruflich löschen?')) {
                localStorage.removeItem('einkaufszettel_v2');
                location.reload(); // App neustarten
            }
        }

        // ==========================================
        // 4. ITEM LOGIK (Hinzufügen, Abhaken, Löschen)
        // ==========================================
        const manualInput = document.getElementById('manual-input');

        function parseItemInput(input) {
            let text = input.trim().replace(/\.$/, '');
            let quantity = '';
            
            // Zahlwörter am Anfang in Ziffern umwandeln (für Spracheingabe)
            const numWords = {
                'ein': 1, 'eine': 1, 'einen': 1, 'zwei': 2, 'drei': 3, 'vier': 4,
                'fünf': 5, 'sechs': 6, 'sieben': 7, 'acht': 8, 'neun': 9, 'zehn': 10,
                'elf': 11, 'zwölf': 12
            };
            const firstWord = text.split(' ')[0].toLowerCase();
            if (numWords[firstWord]) {
                text = text.replace(new RegExp(`^${firstWord}\\s+`, 'i'), numWords[firstWord] + ' ');
            }

            // Erkennt Zahlen (auch mit Komma) und optionale Einheiten am Anfang
            // z.B. "3 kg", "1,5 Liter", "2 Flaschen", "5"
            const match = text.match(/^(\d+(?:[.,]\d+)?)\s*(kg|g|l|ml|liter|packung|packungen|flasche|flaschen|stück|dose|dosen|x)?\s+(.*)$/i);
            
            if (match) {
                let amount = match[1];
                let unit = match[2] ? ' ' + match[2] : '';
                quantity = (amount + unit).trim();
                text = match[3];
            }

            return {
                text: text.charAt(0).toUpperCase() + text.slice(1),
                quantity: quantity
            };
        }

        function addItem(text) {
            if (!text.trim()) return;
            
            const parsed = parseItemInput(text);
            const currentList = getCurrentList();

            currentList.items.push({
                id: Date.now().toString(),
                text: parsed.text,
                quantity: parsed.quantity,
                quantityConfirmed: false,
                checked: false
            });
            
            saveData();
            updateMenuUI(); 
            updateShoppingUI();
            manualInput.value = ''; 
        }

        function toggleQuantity(event, id) {
            event.stopPropagation(); // Verhindert, dass das Klick-Event den ganzen Artikel abhakt
            const currentList = getCurrentList();
            const item = currentList.items.find(i => i.id === id);
            if (item && item.quantity) {
                item.quantityConfirmed = !item.quantityConfirmed;
                saveData();
                updateShoppingUI();
            }
        }

        function toggleItem(id) {
            const currentList = getCurrentList();
            const item = currentList.items.find(i => i.id === id);
            if (item) item.checked = !item.checked;
            saveData();
            updateShoppingUI();
        }

        function deleteItem(id) {
            const currentList = getCurrentList();
            currentList.items = currentList.items.filter(item => item.id !== id);
            saveData();
            updateMenuUI();
            updateShoppingUI();
        }

        // ==========================================
        // 5. VIEW NAVIGATION
        // ==========================================
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if (viewId === 'view-lists' || viewId === 'view-settings') updateMenuUI();
        }

        function switchTab(viewId, btnElement) {
            switchView(viewId);
            // Tab Button Styles aktualisieren
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'text-teal-600');
                btn.classList.add('text-gray-400');
            });
            btnElement.classList.add('active', 'text-teal-600');
            btnElement.classList.remove('text-gray-400');
        }

        // ==========================================
        // 6. SPRACHERKENNUNG
        // ==========================================
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const statusText = document.getElementById('status-text');
        const addBtn = document.getElementById('add-btn');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                isListening = true;
                micBtn.classList.add('listening');
                micIcon.classList.remove('ph-microphone');
                micIcon.classList.add('ph-microphone-stage');
                statusText.textContent = "Ich höre zu...";
                statusText.classList.add('text-teal-600', 'font-medium');
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                addItem(transcript);
                statusText.textContent = `"${transcript}" hinzugefügt!`;
                setTimeout(() => { if(!isListening) statusText.textContent = ""; }, 2000);
            };

            recognition.onerror = function(event) {
                console.error("Spracherkennung Fehler:", event.error);
                statusText.textContent = "Fehler. Bitte erneut versuchen.";
                statusText.className = "text-center text-sm text-red-500 mb-3 h-5 transition-opacity";
                stopListening();
                setTimeout(() => { if(!isListening) statusText.textContent = ""; }, 3000);
            };

            recognition.onend = function() { stopListening(); };
        } else {
            micBtn.style.display = 'none';
        }

        function stopListening() {
            isListening = false;
            micBtn.classList.remove('listening');
            micIcon.classList.add('ph-microphone');
            micIcon.classList.remove('ph-microphone-stage');
            if(statusText.textContent.includes("Ich höre zu")) statusText.textContent = "";
        }

        micBtn.addEventListener('click', () => {
            if (!recognition) return alert("Browser unterstützt keine Spracheingabe.");
            if (isListening) { recognition.stop(); } 
            else { 
                recognition.lang = appData.settings.lang;
                recognition.start(); 
            }
        });

        addBtn.addEventListener('click', () => addItem(manualInput.value));
        manualInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addItem(manualInput.value); });


        // ==========================================
        // 7. PWA (APP INSTALLIEREN) LOGIK (Single-File Trick)
        // ==========================================
        
        // 7.1 Manifest on-the-fly generieren
        const manifest = {
            name: "Einkaufszettel",
            short_name: "Einkauf",
            display: "standalone",
            background_color: "#f3f4f6",
            theme_color: "#0d9488",
            start_url: location.href,
            icons: [{
                // Ein einfaches SVG Icon als Base64 kodiert

        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

        // 7.2 Service Worker Dummy registrieren (wird von Chrome für den Install-Prompt gefordert)
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', (e) => {}); // Leerer Fetch-Handler reicht meist aus
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW Info:', err));
        }

        // 7.3 Install Prompt abfangen und Button anzeigen
        let deferredPrompt;
        const installContainer = document.getElementById('install-container');
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Standard-Prompt des Browsers unterdrücken
            e.preventDefault();
            // Event speichern, um es später auszulösen
            deferredPrompt = e;
            // Unseren custom "Installieren" Button im Menü anzeigen
            installContainer.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installContainer.classList.add('hidden'); // Verstecken nach erfolgreicher Installation
                }
                deferredPrompt = null;
            }
        });


        // ==========================================
        // INITIALISIERUNG
        // ==========================================
        loadData();
        updateShoppingUI();

    </script>
