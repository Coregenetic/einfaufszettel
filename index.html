<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Einkaufszettel Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d9488">

    <link id="manifest-link" rel="manifest" href="">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view { display: none; }
        .view.active { display: flex; flex-direction: column; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="h-full w-full bg-gray-50 dark:bg-gray-900 overflow-hidden flex justify-center">

    <div class="max-w-md w-full bg-white dark:bg-gray-950 h-full shadow-2xl relative flex flex-col overflow-hidden">
        
        <!-- VIEW: EINKAUF -->
        <div id="view-shopping" class="view active h-full w-full flex-col">
            <header class="bg-teal-600 dark:bg-teal-800 text-white p-6 shadow-md z-10">
                <h1 class="text-2xl font-bold" id="current-list-title">Lade Liste...</h1>
                <p class="text-teal-100 text-sm" id="item-count">0 Artikel</p>
            </header>
            <main class="flex-1 overflow-y-auto p-4" id="shopping-list-container"></main>
            <div class="bg-gray-50 dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-4">
                <select id="store-select" class="w-full mb-2 bg-white dark:bg-gray-800 text-sm font-bold p-2 rounded-lg border dark:border-gray-700 dark:text-white">
                    <option value="Allgemein">🛒 Allgemein</option>
                    <option value="Aldi">🔵 Aldi</option>
                    <option value="Lidl">🟡 Lidl</option>
                    <option value="Rewe">🔴 Rewe</option>
                </select>
                <div class="flex gap-2">
                    <input type="text" id="manual-input" placeholder="Artikel..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
                    <button id="mic-btn" class="w-12 h-12 bg-teal-600 text-white rounded-xl flex items-center justify-center"><i class="ph ph-microphone text-xl"></i></button>
                </div>
            </div>
        </div>

        <!-- VIEW: LISTEN & SETUP -->
        <div id="view-setup" class="view h-full w-full flex-col bg-gray-50 dark:bg-gray-900 p-6 overflow-y-auto">
            <h2 class="text-xl font-bold mb-6 dark:text-white">Einstellungen & Sync</h2>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm">
                    <span class="dark:text-white">Dark Mode</span>
                    <button onclick="toggleDarkMode()" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg text-xl">🌙</button>
                </div>
                
                <div class="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm">
                    <span class="dark:text-white">Supermarkt-Modus (Display an)</span>
                    <button onclick="toggleWakeLock()" id="wakelock-btn" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg">OFF</button>
                </div>

                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm space-y-2">
                    <h3 class="font-bold dark:text-white">GitHub Sync</h3>
                    <input type="text" id="git-token" placeholder="GitHub Token" class="w-full p-2 bg-gray-100 dark:bg-gray-900 rounded-lg text-sm dark:text-white">
                    <input type="text" id="git-repo" placeholder="user/repo" class="w-full p-2 bg-gray-100 dark:bg-gray-900 rounded-lg text-sm dark:text-white">
                    <button onclick="syncToGit()" class="w-full p-2 bg-teal-600 text-white rounded-lg font-bold">Synchronisieren</button>
                </div>
            </div>
        </div>

        <nav class="bg-white dark:bg-gray-950 border-t dark:border-gray-800 flex pb-safe">
            <button onclick="switchTab('view-shopping')" class="flex-1 py-4 text-teal-600 font-bold">Einkauf</button>
            <button onclick="switchTab('view-setup')" class="flex-1 py-4 text-gray-400 font-bold">Setup</button>
        </nav>
    </div>

    <script>
        let appData = { lists: [{ id: 'l1', name: 'Standard', items: [] }], settings: { darkMode: false } };
        let wakeLock = null;

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            appData.settings.darkMode = document.documentElement.classList.contains('dark');
            saveData();
        }

        async function toggleWakeLock() {
            if (wakeLock) {
                await wakeLock.release();
                wakeLock = null;
                document.getElementById('wakelock-btn').textContent = "OFF";
            } else {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wakelock-btn').textContent = "ON";
                } catch (e) { alert("WakeLock nicht unterstützt."); }
            }
        }

        async function syncToGit() {
            const token = document.getElementById('git-token').value;
            const repo = document.getElementById('git-repo').value;
            const url = `https://api.github.com/repos/${repo}/contents/data.json`;
            
            // 1. Get current SHA to overwrite
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` }});
            const data = await res.json();
            
            // 2. Put update
            await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update List",
                    content: btoa(JSON.stringify(appData)),
                    sha: data.sha
                })
            });
            alert("Erfolgreich synchronisiert!");
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        function saveData() { localStorage.setItem('einkaufszettel_pro', JSON.stringify(appData)); }
        function loadData() { 
            const saved = localStorage.getItem('einkaufszettel_pro');
            if(saved) appData = JSON.parse(saved);
            if(appData.settings.darkMode) document.documentElement.classList.add('dark');
        }

        loadData();
    </script>
</body>
</html>
