<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Einkaufszettel Pro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d9488">
<link id="manifest-link" rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script>tailwind.config = { darkMode: 'class' }</script>
<style>
  :root {
    --accent: #0d9488;
    --accent-strong: #0f5e58;
    --accent-soft: rgba(13,148,136,0.12);
    --accent-soft-strong: rgba(13,148,136,0.3);
  }
  body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: pan-y; }
  .view { display: none; }
  .view.active { display: flex; flex-direction: column; }
  .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  .item-row.done .item-name { text-decoration: line-through; opacity: 0.5; transition: all 0.2s ease; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes slideFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .item-anim { animation: slideFadeIn 0.25s ease both; }
  @keyframes chipPop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .chip-anim { animation: chipPop 0.2s ease both; }
  #snackbar { transition: transform 0.25s ease, opacity 0.25s ease; }
  #modal-overlay { transition: opacity 0.2s ease; }
</style>
</head>
<body class="h-full w-full bg-gray-50 dark:bg-gray-900 overflow-hidden flex justify-center">
<div class="max-w-md w-full bg-white dark:bg-gray-950 h-full shadow-2xl relative flex flex-col overflow-hidden">

  <!-- VIEW: EINKAUF -->
  <div id="view-shopping" class="view active h-full w-full flex-col">
    <header class="bg-[var(--accent)] dark:bg-[var(--accent-strong)] text-white shadow-md z-10 shrink-0">
      <div id="list-chips" class="flex gap-2 overflow-x-auto px-4 pt-4 pb-2 no-scrollbar items-center"></div>
      <div class="px-6 pb-1">
        <h1 class="text-xl font-bold" id="current-list-title">Lade Liste...</h1>
        <p class="text-white/80 text-sm" id="item-count">0 Artikel</p>
        <p class="text-amber-200 text-xs hidden" id="price-sum"></p>
      </div>
      <div class="px-6 pb-3 flex items-center gap-2">
        <i class="ph ph-storefront text-white/80"></i>
        <select id="store-select-active" onchange="onActiveStoreChange(this.value)" class="bg-white/20 text-white text-sm rounded-lg px-2 py-1 border border-white/30 outline-none font-bold"></select>
        <span class="text-xs text-white/70">sortiert die Liste nach Gang</span>
        <button onclick="switchTab('view-setup')" class="ml-auto text-xs text-white/80 underline shrink-0">Reihenfolge ändern</button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 space-y-1" id="shopping-list-container"></main>

    <div class="bg-gray-50 dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-4">
      <div id="favorite-chips" class="flex gap-2 overflow-x-auto no-scrollbar mb-2 pb-1"></div>
      <select id="category-select" class="w-full mb-2 bg-white dark:bg-gray-800 text-sm font-bold p-2 rounded-lg border dark:border-gray-700 dark:text-white"></select>
      <div class="flex gap-2">
        <input type="text" id="manual-input" placeholder="Artikel..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
        <button id="mic-btn" class="w-12 h-12 bg-[var(--accent)] text-white rounded-xl flex items-center justify-center shrink-0 transition-colors"><i class="ph ph-microphone text-xl"></i></button>
      </div>
    </div>
  </div>

  <!-- VIEW: SETUP -->
  <div id="view-setup" class="view h-full w-full flex-col bg-gray-50 dark:bg-gray-900 p-6 overflow-y-auto">
    <h2 class="text-xl font-bold mb-6 dark:text-white">Einstellungen</h2>
    <div class="space-y-4">

      <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm space-y-3">
        <h3 class="font-bold dark:text-white flex items-center gap-2"><i class="ph ph-palette"></i> Akzentfarbe</h3>
        <div class="flex gap-2 flex-wrap" id="accent-presets"></div>
        <div class="flex items-center gap-2 pt-1">
          <input type="color" id="accent-custom" value="#0d9488" onchange="setAccentColor(this.value)" class="w-10 h-10 rounded-lg border-0 bg-transparent cursor-pointer">
          <span class="text-sm text-gray-500 dark:text-gray-400">Eigene Farbe wählen</span>
        </div>
      </div>

      <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm space-y-3">
        <h3 class="font-bold dark:text-white flex items-center gap-2"><i class="ph ph-map-pin-line"></i> Gang-Reihenfolge pro Markt</h3>
        <div class="flex gap-2">
          <select id="aisle-store-select" onchange="renderAisleOrder()" class="flex-1 bg-gray-100 dark:bg-gray-700 dark:text-white p-2 rounded-lg text-sm"></select>
          <button onclick="promptNewStore()" class="px-3 bg-[var(--accent)] text-white rounded-lg text-sm font-bold">+ Markt</button>
        </div>
        <div id="aisle-order-list" class="space-y-1"></div>
      </div>

      <div class="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm">
        <span class="dark:text-white">Dark Mode</span>
        <button onclick="toggleDarkMode()" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg text-xl">🌙</button>
      </div>
      <div class="flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm">
        <span class="dark:text-white">Supermarkt-Modus (Display an)</span>
        <button onclick="toggleWakeLock()" id="wakelock-btn" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg">OFF</button>
      </div>
      <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm space-y-2">
        <h3 class="font-bold dark:text-white">Erledigte Artikel löschen</h3>
        <button onclick="clearDone()" class="w-full p-2 bg-gray-200 dark:bg-gray-700 rounded-lg font-bold dark:text-white">Abgehakte entfernen</button>
      </div>
      <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm space-y-2">
        <h3 class="font-bold dark:text-white">Lokales Backup</h3>
        <button onclick="exportData()" class="w-full p-2 bg-[var(--accent)] text-white rounded-lg font-bold">Als Datei exportieren</button>
        <label class="w-full block text-center p-2 bg-gray-200 dark:bg-gray-700 rounded-lg font-bold dark:text-white cursor-pointer">
          Datei importieren
          <input type="file" id="import-file" accept="application/json" class="hidden" onchange="importData(event)">
        </label>
      </div>
    </div>
  </div>

  <nav class="bg-white dark:bg-gray-950 border-t dark:border-gray-800 flex pb-safe shrink-0">
    <button onclick="switchTab('view-shopping')" id="tab-shopping" class="flex-1 py-4 text-[var(--accent)] font-bold">Einkauf</button>
    <button onclick="switchTab('view-setup')" id="tab-setup" class="flex-1 py-4 text-gray-400 font-bold">Setup</button>
  </nav>

  <!-- SNACKBAR -->
  <div id="snackbar" class="absolute left-4 right-4 bottom-20 bg-gray-900 text-white rounded-xl p-3 flex items-center justify-between shadow-xl opacity-0 pointer-events-none translate-y-4 z-30">
    <span id="snackbar-text" class="text-sm"></span>
    <button id="snackbar-undo" class="text-[var(--accent)] font-bold text-sm ml-4 shrink-0">RÜCKGÄNGIG</button>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="absolute inset-0 bg-black/50 z-40 items-end justify-center hidden">
    <div id="modal-content" class="bg-white dark:bg-gray-900 w-full rounded-t-2xl p-6 space-y-4"></div>
  </div>

</div>

<script>
const DEFAULT_CATEGORIES = ["Obst & Gemüse","Brot & Backwaren","Milchprodukte & Eier","Fleisch, Wurst & Fisch","Tiefkühl","Konserven & Trockenware","Getränke","Süßes & Snacks","Drogerie & Hygiene","Haushalt","Sonstiges"];
const CATEGORY_ICON = {"Obst & Gemüse":"🥦","Brot & Backwaren":"🍞","Milchprodukte & Eier":"🥛","Fleisch, Wurst & Fisch":"🥩","Tiefkühl":"🧊","Konserven & Trockenware":"🥫","Getränke":"🥤","Süßes & Snacks":"🍫","Drogerie & Hygiene":"🧴","Haushalt":"🧽","Sonstiges":"📦"};
const CATEGORY_KEYWORDS = {
  "Obst & Gemüse": ["apfel","banane","tomate","gurke","kartoffel","zwiebel","salat","paprika","zitrone","möhre","karotte","obst","gemüse","knoblauch","pilz","birne","trauben","avocado"],
  "Brot & Backwaren": ["brot","brötchen","toast","baguette","kuchen","gebäck","croissant"],
  "Milchprodukte & Eier": ["milch","käse","joghurt","butter","quark","sahne","ei","eier"],
  "Fleisch, Wurst & Fisch": ["fleisch","wurst","schinken","hähnchen","huhn","rind","schwein","fisch","lachs","salami","speck"],
  "Tiefkühl": ["tiefkühl","pizza","eis","tk"],
  "Konserven & Trockenware": ["nudeln","reis","mehl","zucker","dose","konserve","müsli","haferflocken","salz"],
  "Getränke": ["wasser","saft","cola","bier","wein","limo","getränk","kaffee","tee"],
  "Süßes & Snacks": ["schokolade","chips","süßigkeit","gummibär","keks","kekse"],
  "Drogerie & Hygiene": ["shampoo","zahnpasta","seife","duschgel","klopapier","toilettenpapier","deo","binden"],
  "Haushalt": ["spülmittel","waschmittel","müllbeutel","batterie","reiniger","schwamm"]
};
const LIST_EMOJIS = ["📝","🛒","🎉","🏠","🎄","🍺","☕","🐾"];

const NUMBER_WORDS = { "ein":1,"eine":1,"einen":1,"zwei":2,"drei":3,"vier":4,"fünf":5,"sechs":6,"sieben":7,"acht":8,"neun":9,"zehn":10,"elf":11,"zwölf":12 };
const UNIT_MAP = { "kilo":"kg","kg":"kg","gramm":"g","g":"g","liter":"l","l":"l","ml":"ml","packung":"Packung","packungen":"Packung","stück":"Stück","st":"Stück","dose":"Dose","dosen":"Dose","flasche":"Flasche","flaschen":"Flasche","glas":"Glas","gläser":"Glas","becher":"Becher","rolle":"Rolle","rollen":"Rolle","tüte":"Tüte","tüten":"Tüte","bund":"Bund" };
const UNIT_ALT = Object.keys(UNIT_MAP).sort((a,b) => b.length - a.length).join('|');
const NUM_ALT = Object.keys(NUMBER_WORDS).join('|');
const QTY_REGEX = new RegExp(`^(\\d+(?:[.,]\\d+)?|${NUM_ALT})\\s*(${UNIT_ALT})?\\.?\\s+(.+)$`, 'i');

// Erkennt z.B. "2 Kilo Kartoffeln", "3 Packungen Milch", "5 Äpfel" -> {qty, name}
function parseQuantity(raw) {
  const text = raw.trim();
  const match = text.match(QTY_REGEX);
  if (!match) return { qty: null, name: text };
  let [, numPart, unitPart, rest] = match;
  let num = NUMBER_WORDS[numPart.toLowerCase()] ?? parseFloat(numPart.replace(',', '.'));
  if (isNaN(num)) return { qty: null, name: text };
  const unit = unitPart ? (UNIT_MAP[unitPart.toLowerCase()] || unitPart) : 'x';
  const qty = unit === 'x' ? `${num}x` : `${num} ${unit}`;
  return { qty, name: rest.trim() };
}

let appData = {
  lists: [{ id: 'l1', name: 'Standard', icon: '📝', items: [] }],
  activeListId: 'l1',
  stores: { "Aldi": [...DEFAULT_CATEGORIES], "Lidl": [...DEFAULT_CATEGORIES], "Rewe": [...DEFAULT_CATEGORIES] },
  activeStoreId: 'Aldi',
  itemHistory: {},
  settings: { darkMode: false, accentColor: '#0d9488' }
};
let wakeLock = null;
let lastUndoTimeout = null;

function getActiveList() { return appData.lists.find(l => l.id === appData.activeListId) || appData.lists[0]; }

function saveData() { localStorage.setItem('einkaufszettel_pro', JSON.stringify(appData)); }

function loadData() {
  const saved = localStorage.getItem('einkaufszettel_pro');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      appData = parsed;
      if (!appData.stores) appData.stores = { "Aldi": [...DEFAULT_CATEGORIES], "Lidl": [...DEFAULT_CATEGORIES], "Rewe": [...DEFAULT_CATEGORIES] };
      if (!appData.activeStoreId) appData.activeStoreId = Object.keys(appData.stores)[0];
      if (!appData.settings) appData.settings = { darkMode: false };
      if (!appData.settings.accentColor) appData.settings.accentColor = '#0d9488';
      if (!appData.itemHistory) appData.itemHistory = {};
      appData.lists.forEach(list => {
        if (!list.icon) list.icon = '📝';
        list.items.forEach(item => {
          if (!item.category) { item.category = guessCategory(item.name); delete item.store; }
          if (item.qty === undefined) item.qty = null;
          if (item.price === undefined) item.price = null;
        });
      });
    } catch (e) { console.error('Konnte gespeicherte Daten nicht laden', e); }
  }
  if (appData.settings.darkMode) document.documentElement.classList.add('dark');
  applyAccentColor(appData.settings.accentColor);
}

function recordHistory(name, category) {
  const key = name.toLowerCase();
  const entry = appData.itemHistory[key] || { count: 0, category, display: name };
  entry.count += 1;
  entry.category = category;
  entry.display = name;
  appData.itemHistory[key] = entry;
}

function guessCategory(name) {
  const lower = (name || '').toLowerCase();
  if (appData.itemHistory && appData.itemHistory[lower]) return appData.itemHistory[lower].category;
  for (const cat in CATEGORY_KEYWORDS) {
    if (CATEGORY_KEYWORDS[cat].some(k => lower.includes(k))) return cat;
  }
  return "Sonstiges";
}

const ACCENT_PRESETS = ['#0d9488', '#dc2626', '#7c3aed', '#2563eb', '#ea580c', '#db2777', '#65a30d', '#0f172a'];

function hexToRgb(hex) {
  const m = hex.replace('#', '').match(/.{1,2}/g);
  return { r: parseInt(m[0], 16), g: parseInt(m[1], 16), b: parseInt(m[2], 16) };
}
function shadeHex(hex, percent) {
  const { r, g, b } = hexToRgb(hex);
  const t = percent < 0 ? 0 : 255;
  const p = Math.abs(percent);
  const newR = Math.round((t - r) * p) + r;
  const newG = Math.round((t - g) * p) + g;
  const newB = Math.round((t - b) * p) + b;
  return `#${[newR, newG, newB].map(v => v.toString(16).padStart(2, '0')).join('')}`;
}
function applyAccentColor(hex) {
  const { r, g, b } = hexToRgb(hex);
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-strong', shadeHex(hex, -0.35));
  document.documentElement.style.setProperty('--accent-soft', `rgba(${r},${g},${b},0.12)`);
  document.documentElement.style.setProperty('--accent-soft-strong', `rgba(${r},${g},${b},0.3)`);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', hex);
}
function setAccentColor(hex) {
  appData.settings.accentColor = hex;
  applyAccentColor(hex);
  saveData();
  renderAccentPresets();
}
function renderAccentPresets() {
  const container = document.getElementById('accent-presets');
  if (!container) return;
  container.innerHTML = ACCENT_PRESETS.map(hex => `
    <button onclick="setAccentColor('${hex}')" class="w-9 h-9 rounded-full border-2 ${appData.settings.accentColor === hex ? 'border-gray-800 dark:border-white' : 'border-transparent'}" style="background:${hex}"></button>
  `).join('');
  document.getElementById('accent-custom').value = appData.settings.accentColor;
}

function toggleDarkMode() {
  document.documentElement.classList.toggle('dark');
  appData.settings.darkMode = document.documentElement.classList.contains('dark');
  saveData();
}

async function toggleWakeLock() {
  if (wakeLock) {
    await wakeLock.release(); wakeLock = null;
    document.getElementById('wakelock-btn').textContent = "OFF";
  } else {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakelock-btn').textContent = "ON";
      wakeLock.addEventListener('release', () => { document.getElementById('wakelock-btn').textContent = "OFF"; wakeLock = null; });
    } catch (e) { alert("WakeLock nicht unterstützt."); }
  }
}

function switchTab(tabId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.getElementById('tab-shopping').classList.toggle('text-[var(--accent)]', tabId === 'view-shopping');
  document.getElementById('tab-shopping').classList.toggle('text-gray-400', tabId !== 'view-shopping');
  document.getElementById('tab-setup').classList.toggle('text-[var(--accent)]', tabId === 'view-setup');
  document.getElementById('tab-setup').classList.toggle('text-gray-400', tabId !== 'view-setup');
  if (tabId === 'view-setup') { populateAisleStoreSelect(); renderAisleOrder(); renderAccentPresets(); }
}

/* ---------- LISTS ---------- */
function renderListChips() {
  const container = document.getElementById('list-chips');
  container.innerHTML = appData.lists.map(list => `
    <button class="chip-anim shrink-0 flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-bold ${list.id === appData.activeListId ? 'bg-white text-[var(--accent-strong)]' : 'bg-white/20 text-white'}"
      onclick="switchList('${list.id}')">
      <span>${list.icon}</span><span>${escapeHtml(list.name)}</span>
      ${list.id === appData.activeListId ? `<i class="ph ph-pencil-simple text-xs ml-1" onclick="event.stopPropagation(); openListActions('${list.id}')"></i>` : ''}
    </button>
  `).join('') + `
    <button class="shrink-0 w-8 h-8 rounded-full bg-white/20 text-white flex items-center justify-center" onclick="openNewListModal()"><i class="ph ph-plus"></i></button>
  `;
}

function switchList(id) { appData.activeListId = id; saveData(); renderShoppingList(); renderListChips(); renderFavoriteChips(); }

function openNewListModal() {
  let selectedEmoji = LIST_EMOJIS[0];
  openModal(`
    <h3 class="font-bold text-lg dark:text-white">Neue Liste</h3>
    <input id="new-list-name" type="text" placeholder="Name (z.B. Party)" class="w-full p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
    <div class="flex gap-2 flex-wrap" id="emoji-picker">
      ${LIST_EMOJIS.map(e => `<button class="emoji-opt text-2xl p-2 rounded-lg border-2 ${e === selectedEmoji ? 'border-[var(--accent)]' : 'border-transparent'}" onclick="selectEmoji(this,'${e}')">${e}</button>`).join('')}
    </div>
    <div class="flex gap-2 pt-2">
      <button class="flex-1 p-3 bg-gray-200 dark:bg-gray-700 dark:text-white rounded-xl font-bold" onclick="closeModal()">Abbrechen</button>
      <button class="flex-1 p-3 bg-[var(--accent)] text-white rounded-xl font-bold" onclick="createNewList()">Erstellen</button>
    </div>
  `);
  window._selectedListEmoji = selectedEmoji;
}
function selectEmoji(btn, emoji) {
  document.querySelectorAll('#emoji-picker .emoji-opt').forEach(b => b.classList.remove('border-[var(--accent)]'));
  btn.classList.add('border-[var(--accent)]');
  window._selectedListEmoji = emoji;
}
function createNewList() {
  const name = document.getElementById('new-list-name').value.trim();
  if (!name) return;
  const id = 'l' + Date.now();
  appData.lists.push({ id, name, icon: window._selectedListEmoji || '📝', items: [] });
  appData.activeListId = id;
  saveData(); closeModal(); renderShoppingList(); renderListChips();
}
function openListActions(id) {
  const list = appData.lists.find(l => l.id === id);
  openModal(`
    <h3 class="font-bold text-lg dark:text-white">${escapeHtml(list.name)}</h3>
    <input id="rename-list-name" type="text" value="${escapeHtml(list.name)}" class="w-full p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
    <div class="flex gap-2 pt-2">
      <button class="flex-1 p-3 bg-[var(--accent)] text-white rounded-xl font-bold" onclick="renameList('${id}')">Speichern</button>
    </div>
    ${appData.lists.length > 1 ? `<button class="w-full p-3 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-xl font-bold" onclick="deleteList('${id}')">Liste löschen</button>` : ''}
    <button class="w-full p-3 bg-gray-100 dark:bg-gray-800 dark:text-white rounded-xl font-bold" onclick="closeModal()">Abbrechen</button>
  `);
}
function renameList(id) {
  const name = document.getElementById('rename-list-name').value.trim();
  if (!name) return;
  appData.lists.find(l => l.id === id).name = name;
  saveData(); closeModal(); renderListChips(); renderShoppingList();
}
function deleteList(id) {
  if (appData.lists.length <= 1) return;
  appData.lists = appData.lists.filter(l => l.id !== id);
  if (appData.activeListId === id) appData.activeListId = appData.lists[0].id;
  saveData(); closeModal(); renderListChips(); renderShoppingList();
}

/* ---------- STORES / AISLE ORDER ---------- */
function populateStoreSelectActive() {
  const sel = document.getElementById('store-select-active');
  sel.innerHTML = Object.keys(appData.stores).map(s => `<option value="${s}" ${s === appData.activeStoreId ? 'selected' : ''}>${s}</option>`).join('') + `<option value="__new__">+ Neuer Markt</option>`;
}
function onActiveStoreChange(val) {
  if (val === '__new__') { promptNewStore(true); return; }
  appData.activeStoreId = val; saveData(); renderShoppingList();
}
function promptNewStore(fromHeader) {
  openModal(`
    <h3 class="font-bold text-lg dark:text-white">Neuer Markt</h3>
    <input id="new-store-name" type="text" placeholder="z.B. Edeka" class="w-full p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
    <div class="flex gap-2 pt-2">
      <button class="flex-1 p-3 bg-gray-200 dark:bg-gray-700 dark:text-white rounded-xl font-bold" onclick="closeModal(); ${fromHeader ? 'populateStoreSelectActive();' : ''}">Abbrechen</button>
      <button class="flex-1 p-3 bg-[var(--accent)] text-white rounded-xl font-bold" onclick="createNewStore(${!!fromHeader})">Erstellen</button>
    </div>
  `);
}
function createNewStore(fromHeader) {
  const name = document.getElementById('new-store-name').value.trim();
  if (!name || appData.stores[name]) { closeModal(); return; }
  appData.stores[name] = [...DEFAULT_CATEGORIES];
  if (fromHeader) appData.activeStoreId = name;
  saveData(); closeModal();
  populateStoreSelectActive(); populateAisleStoreSelect(); renderAisleOrder(); renderShoppingList();
}
function populateAisleStoreSelect() {
  const sel = document.getElementById('aisle-store-select');
  const current = sel.value && appData.stores[sel.value] ? sel.value : Object.keys(appData.stores)[0];
  sel.innerHTML = Object.keys(appData.stores).map(s => `<option value="${s}" ${s === current ? 'selected' : ''}>${s}</option>`).join('');
}
function renderAisleOrder() {
  const storeName = document.getElementById('aisle-store-select').value;
  const order = appData.stores[storeName];
  if (!order) return;
  document.getElementById('aisle-order-list').innerHTML = order.map((cat, i) => `
    <div class="flex items-center justify-between bg-gray-100 dark:bg-gray-700 rounded-lg p-2">
      <span class="text-sm dark:text-white">${CATEGORY_ICON[cat] || '📦'} ${cat}</span>
      <div class="flex gap-1">
        <button onclick="moveCategory('${storeName}',${i},-1)" class="w-7 h-7 bg-white dark:bg-gray-600 rounded-md flex items-center justify-center ${i === 0 ? 'opacity-30 pointer-events-none' : ''}"><i class="ph ph-caret-up text-xs"></i></button>
        <button onclick="moveCategory('${storeName}',${i},1)" class="w-7 h-7 bg-white dark:bg-gray-600 rounded-md flex items-center justify-center ${i === order.length - 1 ? 'opacity-30 pointer-events-none' : ''}"><i class="ph ph-caret-down text-xs"></i></button>
      </div>
    </div>
  `).join('');
}
function moveCategory(storeName, index, dir) {
  const order = appData.stores[storeName];
  const newIndex = index + dir;
  if (newIndex < 0 || newIndex >= order.length) return;
  [order[index], order[newIndex]] = [order[newIndex], order[index]];
  saveData(); renderAisleOrder();
  if (storeName === appData.activeStoreId) renderShoppingList();
}

/* ---------- ITEMS ---------- */
function populateCategorySelect() {
  document.getElementById('category-select').innerHTML = DEFAULT_CATEGORIES.map(c => `<option value="${c}">${CATEGORY_ICON[c]} ${c}</option>`).join('');
}

function addItem(rawText, category) {
  rawText = rawText.trim();
  if (!rawText) return;
  const { qty, name } = parseQuantity(rawText);
  if (!name) return;
  const list = getActiveList();
  const finalCategory = category || guessCategory(name);
  recordHistory(name, finalCategory);

  // Bereits vorhandenen, noch offenen Artikel mit gleichem Namen/Kategorie erweitern statt duplizieren
  const existing = list.items.find(i => !i.done && i.name.toLowerCase() === name.toLowerCase() && i.category === finalCategory);
  if (existing && qty) {
    existing.qty = qty;
    saveData(); renderShoppingList(); renderFavoriteChips();
    return;
  }
  list.items.push({ id: 'i' + Date.now() + Math.random().toString(36).slice(2, 6), name, qty: qty || null, price: null, category: finalCategory, done: false });
  saveData(); renderShoppingList(); renderFavoriteChips();
}

function addFavorite(name, category) {
  document.getElementById('manual-input').value = '';
  addItem(name, category);
}

function openEditItemModal(id) {
  const item = getActiveList().items.find(i => i.id === id);
  if (!item) return;
  openModal(`
    <h3 class="font-bold text-lg dark:text-white">Artikel bearbeiten</h3>
    <input id="edit-item-name" type="text" value="${escapeHtml(item.name)}" placeholder="Name" class="w-full p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
    <div class="flex gap-2">
      <input id="edit-item-qty" type="text" value="${item.qty ? escapeHtml(item.qty) : ''}" placeholder="Menge (z.B. 2 kg, 3x)" class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
      <input id="edit-item-price" type="number" step="0.01" min="0" value="${item.price ?? ''}" placeholder="Preis €" class="w-28 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
    </div>
    <select id="edit-item-category" class="w-full p-3 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white outline-none">
      ${DEFAULT_CATEGORIES.map(c => `<option value="${c}" ${c === item.category ? 'selected' : ''}>${CATEGORY_ICON[c]} ${c}</option>`).join('')}
    </select>
    <div class="flex gap-2 pt-2">
      <button class="flex-1 p-3 bg-gray-200 dark:bg-gray-700 dark:text-white rounded-xl font-bold" onclick="closeModal()">Abbrechen</button>
      <button class="flex-1 p-3 bg-[var(--accent)] text-white rounded-xl font-bold" onclick="saveEditItem('${id}')">Speichern</button>
    </div>
  `);
}
function saveEditItem(id) {
  const item = getActiveList().items.find(i => i.id === id);
  if (!item) return;
  const name = document.getElementById('edit-item-name').value.trim();
  if (!name) return;
  item.name = name;
  item.qty = document.getElementById('edit-item-qty').value.trim() || null;
  const priceVal = document.getElementById('edit-item-price').value;
  item.price = priceVal !== '' ? parseFloat(priceVal) : null;
  item.category = document.getElementById('edit-item-category').value;
  recordHistory(name, item.category);
  saveData(); closeModal(); renderShoppingList(); renderFavoriteChips();
}

function toggleItemDone(id) {
  const item = getActiveList().items.find(i => i.id === id);
  if (item) { item.done = !item.done; saveData(); renderShoppingList(); renderFavoriteChips(); }
}

function deleteItem(id) {
  const list = getActiveList();
  const idx = list.items.findIndex(i => i.id === id);
  if (idx === -1) return;
  const [removed] = list.items.splice(idx, 1);
  saveData(); renderShoppingList(); renderFavoriteChips();
  showUndo('Artikel gelöscht', () => { list.items.splice(idx, 0, removed); saveData(); renderShoppingList(); renderFavoriteChips(); });
}

function clearDone() {
  const list = getActiveList();
  const removed = [];
  list.items.forEach((item, index) => { if (item.done) removed.push({ item, index }); });
  if (removed.length === 0) return;
  list.items = list.items.filter(i => !i.done);
  saveData(); renderShoppingList(); renderFavoriteChips();
  showUndo(removed.length + ' Artikel entfernt', () => {
    removed.sort((a, b) => a.index - b.index).forEach(r => list.items.splice(r.index, 0, r.item));
    saveData(); renderShoppingList(); renderFavoriteChips();
  });
}

function showUndo(text, undoFn) {
  clearTimeout(lastUndoTimeout);
  const bar = document.getElementById('snackbar');
  document.getElementById('snackbar-text').textContent = text;
  const undoBtn = document.getElementById('snackbar-undo');
  undoBtn.onclick = () => { undoFn(); hideUndo(); };
  bar.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
  lastUndoTimeout = setTimeout(hideUndo, 4000);
}
function hideUndo() {
  document.getElementById('snackbar').classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
}

function renderShoppingList() {
  const list = getActiveList();
  const container = document.getElementById('shopping-list-container');
  document.getElementById('current-list-title').textContent = list.name;
  const openCount = list.items.filter(i => !i.done).length;
  document.getElementById('item-count').textContent = `${openCount} offen · ${list.items.length} Artikel`;

  const priceSum = list.items.filter(i => !i.done && i.price != null).reduce((sum, i) => sum + i.price, 0);
  const priceEl = document.getElementById('price-sum');
  if (priceSum > 0) { priceEl.textContent = `≈ ${priceSum.toFixed(2)} € (offene Artikel)`; priceEl.classList.remove('hidden'); }
  else { priceEl.classList.add('hidden'); }

  if (list.items.length === 0) {
    container.innerHTML = '<p class="text-center text-gray-400 mt-8">Noch keine Artikel. Fang unten an zu tippen!</p>';
    return;
  }
  if (openCount === 0) {
    container.innerHTML = '<div class="text-center mt-8"><p class="text-4xl mb-2">🎉</p><p class="text-gray-400">Alles erledigt!</p></div>';
    return;
  }

  const order = appData.stores[appData.activeStoreId] || DEFAULT_CATEGORIES;
  const groups = {};
  list.items.forEach(item => { (groups[item.category] ||= []).push(item); });

  const sortedCats = Object.keys(groups).sort((a, b) => {
    const ia = order.indexOf(a), ib = order.indexOf(b);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });

  let rowIndex = 0;
  container.innerHTML = sortedCats.map(cat => `
    <div class="mb-3">
      <p class="text-xs font-bold uppercase text-gray-400 mb-1">${CATEGORY_ICON[cat] || '📦'} ${cat}</p>
      ${groups[cat].map(item => {
        const delay = (rowIndex++ * 25);
        return `
        <div class="relative overflow-hidden rounded-xl mb-1">
          <div class="absolute inset-0 bg-red-500 flex items-center justify-end pr-4 text-white"><i class="ph ph-trash text-xl"></i></div>
          <div class="item-row item-anim ${item.done ? 'done' : ''} relative bg-gray-50 dark:bg-gray-800 rounded-xl p-3 flex items-center justify-between" style="transition-delay:${delay}ms" data-id="${item.id}">
            <label class="flex items-center gap-3 flex-1 cursor-pointer select-none min-w-0">
              <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleItemDone('${item.id}')" class="w-5 h-5 accent-[var(--accent)] shrink-0">
              <span class="item-name dark:text-white break-words truncate">${escapeHtml(item.name)}</span>
              ${item.qty ? `<span class="text-xs font-bold text-[var(--accent-strong)] dark:text-[var(--accent)] bg-[var(--accent-soft)] dark:bg-[var(--accent-soft-strong)] px-2 py-0.5 rounded-full shrink-0">${escapeHtml(item.qty)}</span>` : ''}
              ${item.price != null ? `<span class="text-xs font-bold text-amber-700 dark:text-amber-300 bg-amber-100 dark:bg-amber-900/40 px-2 py-0.5 rounded-full shrink-0">${item.price.toFixed(2)} €</span>` : ''}
            </label>
            <button onclick="openEditItemModal('${item.id}')" class="text-gray-400 hover:text-[var(--accent)] p-2 shrink-0"><i class="ph ph-pencil-simple"></i></button>
            <button onclick="deleteItem('${item.id}')" class="text-gray-400 hover:text-red-500 p-2 shrink-0"><i class="ph ph-trash"></i></button>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');

  container.querySelectorAll('.item-row').forEach(row => attachSwipe(row, row.dataset.id));
}

function attachSwipe(rowEl, id) {
  let startX = 0, startY = 0, dx = 0, dragging = false, directionLocked = false, isHorizontal = false;
  rowEl.addEventListener('pointerdown', e => {
    startX = e.clientX; startY = e.clientY; dx = 0; dragging = true; directionLocked = false;
    rowEl.setPointerCapture(e.pointerId); rowEl.style.transition = 'none';
  });
  rowEl.addEventListener('pointermove', e => {
    if (!dragging) return;
    dx = e.clientX - startX; const dy = e.clientY - startY;
    if (!directionLocked) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) { directionLocked = true; isHorizontal = Math.abs(dx) > Math.abs(dy); }
      else return;
    }
    if (!isHorizontal) return;
    if (dx > 0) dx = 0;
    rowEl.style.transform = `translateX(${Math.max(dx, -90)}px)`;
  });
  const end = () => {
    if (!dragging) return;
    dragging = false; rowEl.style.transition = 'transform 0.2s ease';
    if (isHorizontal && dx < -60) {
      rowEl.style.transform = 'translateX(-100%)'; rowEl.style.opacity = '0';
      setTimeout(() => deleteItem(id), 150);
    } else { rowEl.style.transform = 'translateX(0)'; }
    directionLocked = false;
  };
  rowEl.addEventListener('pointerup', end);
  rowEl.addEventListener('pointercancel', end);
}

function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

function renderFavoriteChips() {
  const container = document.getElementById('favorite-chips');
  const list = getActiveList();
  const openNames = new Set(list.items.filter(i => !i.done).map(i => i.name.toLowerCase()));
  const top = Object.entries(appData.itemHistory)
    .filter(([key]) => !openNames.has(key))
    .sort((a, b) => b[1].count - a[1].count)
    .slice(0, 8);
  if (top.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = top.map(([key, entry]) => `
    <button class="shrink-0 text-xs font-bold px-3 py-1.5 rounded-full bg-[var(--accent-soft)] dark:bg-[var(--accent-soft-strong)] text-[var(--accent-strong)] dark:text-[var(--accent)] flex items-center gap-1"
      onclick="addFavorite('${escapeHtml(entry.display).replace(/'/g, "\\'")}', '${entry.category}')">
      <i class="ph ph-plus text-xs"></i>${CATEGORY_ICON[entry.category] || ''} ${escapeHtml(entry.display)}
    </button>
  `).join('');
}

/* ---------- MODAL ---------- */
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden'); overlay.classList.add('flex');
}
function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('hidden'); overlay.classList.remove('flex');
}
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });

/* ---------- EXPORT / IMPORT ---------- */
function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `einkaufszettel-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed.lists) throw new Error('Ungültiges Format');
      appData = parsed;
      if (!appData.stores) appData.stores = { "Aldi": [...DEFAULT_CATEGORIES] };
      if (!appData.activeStoreId) appData.activeStoreId = Object.keys(appData.stores)[0];
      if (!appData.settings) appData.settings = { darkMode: false, accentColor: '#0d9488' };
      if (!appData.settings.accentColor) appData.settings.accentColor = '#0d9488';
      saveData();
      document.documentElement.classList.toggle('dark', !!appData.settings.darkMode);
      applyAccentColor(appData.settings.accentColor);
      populateStoreSelectActive(); renderListChips(); renderShoppingList(); renderFavoriteChips();
      alert('Import erfolgreich!');
    } catch (e) { alert('Import fehlgeschlagen: Datei ungültig.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

/* ---------- INPUT: ENTER + MIC ---------- */
document.getElementById('manual-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    addItem(e.target.value, document.getElementById('category-select').value);
    e.target.value = '';
  }
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('mic-btn');
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = 'de-DE'; recognition.continuous = false; recognition.interimResults = false;
  recognition.onresult = (event) => { addItem(event.results[0][0].transcript, null); };
  const reset = () => { micBtn.classList.remove('bg-red-600'); micBtn.classList.add('bg-[var(--accent)]'); };
  recognition.onerror = reset; recognition.onend = reset;
  micBtn.addEventListener('click', () => {
    micBtn.classList.remove('bg-[var(--accent)]'); micBtn.classList.add('bg-red-600');
    recognition.start();
  });
} else {
  micBtn.addEventListener('click', () => alert('Spracheingabe wird von diesem Browser nicht unterstützt.'));
}

/* ---------- INIT ---------- */
loadData();
populateCategorySelect();
populateStoreSelectActive();
populateAisleStoreSelect();
renderListChips();
renderShoppingList();
renderFavoriteChips();

/* ---------- OFFLINE (Service Worker) ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => { /* z.B. bei file:// nicht möglich, ignorieren */ });
  });
}
</script>
